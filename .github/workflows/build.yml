name: Build Tauri App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            rust_targets: x86_64-pc-windows-msvc
            tauri_args: ""
            artifact_name: windows-build
            artifact_path: |
              src-tauri/target/release/bundle/msi/*.msi
              src-tauri/target/release/bundle/nsis/*.exe
          - platform: macos-latest
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
            tauri_args: "--target universal-apple-darwin"
            artifact_name: macos-build
            artifact_path: |
              src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.88.0
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.platform }}

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        with:
          args: ${{ matrix.tauri_args }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish "latest" release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          shopt -s globstar nullglob

          gh release delete latest --yes --cleanup-tag || true

          files=(
            artifacts/**/*.exe
            artifacts/**/*.msi
            artifacts/**/*.dmg
          )

          if [ ${#files[@]} -eq 0 ]; then
            echo "::error::Установщики не найдены среди скачанных артефактов"
            exit 1
          fi

          printf '%s\n' \
            "Автоматическая сборка из коммита \`${GITHUB_SHA:0:7}\`." \
            "" \
            "**Windows** — установщик \`.exe\` / \`.msi\`." \
            "**macOS** (Intel + Apple Silicon) — образ \`.dmg\`." \
            "" \
            "Скачать нужный файл можно ниже в разделе **Assets**." \
            "" \
            "Постоянная ссылка на последнюю версию: https://github.com/${GITHUB_REPOSITORY}/releases/latest" \
            > notes.md

          gh release create latest "${files[@]}" \
            --target "${GITHUB_SHA}" \
            --title "Latest" \
            --notes-file notes.md \
            --latest
